<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Galaxy Designs</title>
  <meta name="theme-color" content="#07090E">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #07090E;
      --bg-card: rgba(13, 17, 28, 0.6);
      --neon-cyan: #00E5FF;
      --neon-blue: #3B82F6;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(0, 229, 255, 0.08), transparent 30%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* =====================
       STARFIELD BACKGROUND
       ===================== */
    .space {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle infinite alternate ease-in-out;
    }

    @keyframes twinkle {
      from {
        opacity: 0.1;
        transform: translateY(0) scale(0.8);
      }
      to {
        opacity: 0.9;
        transform: translateY(-8px) scale(1.2);
      }
    }

    /* =====================
       CENTER CONTENT CARD
       ===================== */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 440px;
      width: 90%;
      padding: 3rem 2rem;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.8s ease forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--text-main);
    }

    .logo span {
      color: var(--neon-cyan);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--text-main), var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    /* =====================
       PULSE BUTTON
       ===================== */
    .retry-btn {
      position: relative;
      background: linear-gradient(135deg, var(--neon-blue), #2563eb);
      color: #fff;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .retry-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }

    .brand {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: rgba(148, 163, 184, 0.6);
      letter-spacing: 0.4px;
    }
  </style>
</head>

<body>
  <div class="space" id="space"></div>

  <div class="content">
    <div class="logo">Galaxy<span>Design</span></div>
    <h1>Connection Lost</h1>
    <p>
      You are currently offline. Please check your internet connection to return to the studio.
    </p>
    <button class="retry-btn" onclick="location.reload()">
      Retry Connection
    </button>

    <div class="brand">© 2026 Galaxy Designs</div>
  </div>

  <script>
    // Generate sleek stars dynamically
    const space = document.getElementById("space");
    const STAR_COUNT = 100;

    for (let i = 0; i < STAR_COUNT; i++) {
      const star = document.createElement("div");
      star.className = "star";
      
      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";
      star.style.animationDuration = 2 + Math.random() * 5 + "s";
      star.style.opacity = Math.random();
      
      space.appendChild(star);
    }
  </script>
</body>
</html>
