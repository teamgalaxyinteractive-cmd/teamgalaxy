<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Blog Detail | Galaxy Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#00e5ff", /* Neon Cyan from image */
              secondary: "#2563eb", /* Deep Blue */
              accent: "#80eeff",
              dark: "#030712", /* Deep space black */
              dark2: "#0a1128", /* Dark card background */
              dark3: "#1e293b",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              heading: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }

      body {
        /* Deep space background matching the image */
        background: radial-gradient(circle at 50% 0%, #0a1128 0%, #03050a 60%, #000000 100%);
        color: #94a3b8; /* Lighter text for paragraphs */
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        line-height: 1.6;
      }

      /* ===== PERFORMANCE: GPU Acceleration ===== */
      .accelerate {
        will-change: transform;
        transform: translateZ(0);
        backface-visibility: hidden;
      }

      /* ===== MINIMAL CREATIVE HEADER ===== */
      .minimal-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: transparent;
        transition: background 0.3s ease, border-color 0.3s ease;
      }

      .minimal-header.scrolled {
        background: rgba(3, 5, 10, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        padding: 0.75rem 2rem;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      /* Styled to match the "View Our Work" button in your image */
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #00e5ff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.5rem 1.25rem;
        border-radius: 50px; /* Pill shape */
        border: 1px solid #00e5ff;
        transition: all 0.3s ease;
        background: transparent;
      }

      .back-btn:hover {
        background: rgba(0, 229, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        transform: translateX(-3px);
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #00e5ff 0%, #2563eb 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        font-size: 1.1rem;
      }

      .logo-text {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        color: white;
        letter-spacing: -0.5px;
      }

      .logo-text span {
        color: #00e5ff; /* Cyan accent matching "Flow" */
      }

      /* ===== OPTIMIZED HERO SECTION ===== */
      .blog-hero {
        position: relative;
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8rem 2rem 4rem;
        overflow: hidden;
      }

      /* Glowing aura matching the reference image backdrop */
      .hero-bg-gradient {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 35%, rgba(0, 229, 255, 0.08) 0%, transparent 60%);
        z-index: -1;
      }

      .hero-particle {
        position: absolute;
        border-radius: 50%;
        background: #00e5ff;
        opacity: 0.5;
        z-index: -1;
        box-shadow: 0 0 10px #00e5ff;
      }

      .hero-particle-1 {
        width: 4px;
        height: 4px;
        top: 20%;
        left: 15%;
        animation: particleFloat1 15s ease-in-out infinite;
      }

      .hero-particle-2 {
        width: 3px;
        height: 3px;
        top: 35%;
        right: 20%;
        animation: particleFloat2 18s ease-in-out infinite;
      }

      .hero-particle-3 {
        width: 5px;
        height: 5px;
        bottom: 25%;
        left: 25%;
        animation: particleFloat1 20s ease-in-out infinite;
      }

      .hero-particle-4 {
        width: 3px;
        height: 3px;
        bottom: 35%;
        right: 15%;
        animation: particleFloat2 16s ease-in-out infinite;
      }

      @keyframes particleFloat1 {
        0%, 100% { transform: translateY(0); opacity: 0.3; }
        50% { transform: translateY(-20px); opacity: 0.8; }
      }

      @keyframes particleFloat2 {
        0%, 100% { transform: translateY(0); opacity: 0.3; }
        50% { transform: translateY(-15px); opacity: 0.6; }
      }

      .hero-orb {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
        filter: blur(60px);
        opacity: 0.6;
        top: 5%;
        right: 5%;
        z-index: -1;
        animation: orbFloat 25s ease-in-out infinite;
      }

      @keyframes orbFloat {
        0%, 100% { transform: translate(0, 0); opacity: 0.4; }
        50% { transform: translate(-30px, 20px); opacity: 0.7; }
      }

      .hero-content {
        text-align: center;
        max-width: 900px;
        position: relative;
        z-index: 1;
        width: 100%;
      }

      .blog-category-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1.25rem;
        background: rgba(0, 229, 255, 0.05);
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #00e5ff;
        margin-bottom: 2rem;
      }

      /* Clean, bold, white text matching "Design" in the image */
      .blog-hero-title {
        font-family: "Outfit", sans-serif;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 1.5rem;
        color: #ffffff;
        word-wrap: break-word;
        overflow-wrap: break-word;
        text-align: center;
        width: 100%;
        letter-spacing: -1px;
      }

      .blog-hero-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem;
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 3rem;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        white-space: nowrap;
      }

      .meta-item i {
        color: #00e5ff;
      }

      .hero-image-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(0, 229, 255, 0.15);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      .hero-image {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
      }

      .image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, #03050a 0%, transparent 50%);
      }

      /* ===== BLOG CONTENT SECTION ===== */
      .blog-content-section {
        padding: 2rem 2rem 4rem;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
      }

      /* Dark glass card matching the reference image graphic */
      .content-card {
        background: rgba(10, 17, 40, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 229, 255, 0.08);
        border-radius: 20px;
        padding: 3rem;
        margin-bottom: 3rem;
        width: 100%;
        overflow-wrap: break-word;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      }

      .blog-full-content {
        font-size: 1.1rem;
        line-height: 1.8;
        color: #cbd5e1;
        width: 100%;
      }

      .blog-full-content p {
        margin-bottom: 1.5rem;
      }

      .blog-full-content h2 {
        font-family: "Outfit", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #ffffff;
        margin: 3rem 0 1.25rem;
        letter-spacing: -0.5px;
      }

      .blog-full-content h3 {
        font-family: "Outfit", sans-serif;
        font-weight: 600;
        font-size: 1.5rem;
        color: #e2e8f0;
        margin: 2rem 0 1rem;
      }

      .blog-full-content ul,
      .blog-full-content ol {
        margin: 1rem 0 1.5rem 1.5rem;
        color: #cbd5e1;
      }

      .blog-full-content li {
        margin-bottom: 0.5rem;
      }

      .blog-full-content a {
        color: #00e5ff;
        text-decoration: none;
        border-bottom: 1px solid rgba(0, 229, 255, 0.3);
        transition: border-color 0.3s;
      }

      .blog-full-content a:hover {
        border-color: #00e5ff;
      }

      .blog-full-content blockquote {
        border-left: 3px solid #00e5ff;
        padding-left: 1.5rem;
        margin: 2rem 0;
        font-style: italic;
        color: #e2e8f0;
        background: linear-gradient(90deg, rgba(0, 229, 255, 0.05) 0%, transparent 100%);
        padding: 1.5rem;
        border-radius: 0 12px 12px 0;
      }

      /* ===== COMMENT SECTION ===== */
      .comment-section {
        background: rgba(10, 17, 40, 0.4);
        border: 1px solid rgba(0, 229, 255, 0.08);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
      }

      .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .comment-header h2 {
        font-family: "Outfit", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #ffffff;
      }

      .comment-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2.5rem;
      }

      .comment-input {
        width: 100%;
        padding: 1rem 1.25rem;
        background: rgba(3, 5, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        resize: vertical;
        min-height: 120px;
        transition: all 0.3s ease;
      }

      .comment-input:focus {
        outline: none;
        border-color: #00e5ff;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
      }

      /* Styled similarly to the "Contact Us" solid pill button */
      .comment-submit {
        align-self: flex-end;
        padding: 0.75rem 2rem;
        background: #ffffff;
        color: #03050a;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-family: "Outfit", sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .comment-submit:hover {
        background: #00e5ff;
        color: #03050a;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
      }

      .comment-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .comments-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        min-height: 50px;
      }

      .comment-card {
        background: rgba(3, 5, 10, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 1.5rem;
        transition: border-color 0.3s ease;
        width: 100%;
      }

      .comment-card:hover {
        border-color: rgba(0, 229, 255, 0.2);
      }

      .comment-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .comment-author {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .comment-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: rgba(0, 229, 255, 0.1);
        border: 1px solid rgba(0, 229, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #00e5ff;
        font-family: "Outfit", sans-serif;
        flex-shrink: 0;
      }

      .comment-author-name {
        font-weight: 600;
        color: #ffffff;
        font-family: "Outfit", sans-serif;
      }

      .comment-time {
        color: #64748b;
        font-size: 0.8rem;
      }

      .comment-text {
        color: #94a3b8;
        line-height: 1.6;
      }

      .auth-required {
        background: rgba(0, 229, 255, 0.05);
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        text-align: center;
        color: #94a3b8;
        margin-bottom: 2rem;
      }

      .auth-required a {
        color: #00e5ff;
        text-decoration: none;
        font-weight: 600;
      }

      .auth-required a:hover {
        text-decoration: underline;
      }

      /* ===== LOADING ===== */
      .loading-spinner {
        border: 2px solid rgba(0, 229, 255, 0.1);
        border-top: 2px solid #00e5ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 2rem auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .hidden {
        display: none !important;
      }

      /* ===== FOOTER ===== */
      footer {
        padding: 3rem 2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        width: 100%;
        background: #000000;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .minimal-header { padding: 1rem; }
        .blog-hero { padding: 6rem 1rem 3rem; min-height: 50vh; }
        .blog-hero-title { font-size: 2rem; }
        .hero-image { height: 250px; }
        .content-card, .comment-section { padding: 1.5rem; border-radius: 16px; }
        .blog-content-section { padding: 2rem 1rem; }
        .blog-hero-meta { gap: 1rem; flex-direction: column; align-items: center; }
        .hero-orb { width: 200px; height: 200px; }
      }
    </style>
  </head>
  <body>
    <header class="minimal-header" id="mainHeader">
      <div class="header-left">
        <a href="/blogs" class="back-btn">
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </a>
        <a href="/" class="header-logo">
          <div class="logo-icon overflow-hidden">
            <img src="https://dl.dropboxusercontent.com/scl/fi/mfz74416c9hveejjam3l2/GalaxyPREMIUM.png?rlkey=5iilzg4ugl81jqlz0dwu71ww1&st=qoq8f477&dl=0" alt="Galaxy Design Logo" class="w-full h-full object-contain" />
          </div>
          <span class="logo-text">Galaxy<span>Design</span></span>
        </a>

    </header>

    <section class="blog-hero">
      <div class="hero-bg-gradient"></div>
      <div class="hero-orb"></div>
      <div class="hero-particle hero-particle-1"></div>
      <div class="hero-particle hero-particle-2"></div>
      <div class="hero-particle hero-particle-3"></div>
      <div class="hero-particle hero-particle-4"></div>

      <div class="hero-content">
        <div class="blog-category-badge">
          <i class="fas fa-cube"></i>
          <span>Blog Post</span>
        </div>
        <h1 class="blog-hero-title" id="blogTitle">Loading...</h1>
        <div class="blog-hero-meta">
          <div class="meta-item">
            <i class="fas fa-calendar"></i>
            <span id="blogDate">--</span>
          </div>
          <div class="meta-item">
            <i class="fas fa-clock"></i>
            <span id="blogReadTime">-- min read</span>
          </div>
          <div class="meta-item">
            <i class="fas fa-star" style="color: #00e5ff"></i>
            <span id="blogInsight">--% Insight</span>
          </div>
        </div>
        <div class="hero-image-container">
          <img
            id="blogImage"
            src=""
            alt="Blog Image"
            class="hero-image"
            onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found'"
          />
          <div class="image-overlay"></div>
        </div>

    <section class="blog-content-section">
      <div class="content-card">
        <div id="blogFullContent" class="blog-full-content"></div>
      </div>

      <div class="comment-section">
        <div class="comment-header">
          <h2>
            <i class="fas fa-comment-dots" style="color: #00e5ff; margin-right: 0.5rem"></i> Discussion
          </h2>
          <span id="commentCount" style="color: #64748b; font-size: 0.9rem">0 comments</span>
        </div>

        <div id="authRequired" class="auth-required hidden">
          <i class="fas fa-lock" style="margin-right: 0.5rem"></i>
          Please <a href="/legal/sign_up">sign in</a> to post comments
        </div>

        <div id="commentForm" class="comment-form hidden">
          <textarea
            id="commentInput"
            class="comment-input"
            placeholder="Share your thoughts..."
            maxlength="500"
          ></textarea>
          <button id="submitCommentBtn" class="comment-submit" onclick="submitComment()">
            Post Comment <i class="fas fa-arrow-right" style="margin-left: 0.5rem"></i>
          </button>
        </div>

        <div id="commentsList" class="comments-list">
          <div class="loading-spinner" id="commentsLoading"></div>
        </div>
      </div>

    <footer>
      <p>© 2026 Galaxy Design. All rights reserved.</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
      import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        collection,
        addDoc,
        query,
        orderBy,
        getDocs,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD0Yv_bQjxi2_kjzPR4XHOlaB7Sb6NRVUc",
        authDomain: "teamgalaxy-77344.firebaseapp.com",
        projectId: "teamgalaxy-77344",
        storageBucket: "teamgalaxy-77344.firebasestorage.app",
        messagingSenderId: "770256225320",
        appId: "1:770256225320:web:5a363ebd757de6cde3a11d",
        measurementId: "G-6C2W9NSNCH",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentBlogId = null;
      let currentUser = null;

      function getBlogIdFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        let blogId = urlParams.get("");
        if (!blogId) blogId = urlParams.get("blogId");
        if (!blogId) {
          const pathParts = window.location.pathname.split("/");
          blogId = pathParts[pathParts.length - 1];
        }
        return blogId;
      }

      function formatDate(timestamp) {
        if (!timestamp) return "Unknown Date";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return date.toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function formatCommentTime(timestamp) {
        if (!timestamp) return "Just now";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return formatDate(timestamp);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function formatContent(text) {
        if (!text) return "<p>No content available</p>";
        const paragraphs = text.split(/\n\n+/);
        return paragraphs.map((p) => `<p>${escapeHtml(p.trim())}</p>`).join("");
      }

      async function loadBlog() {
        const blogId = getBlogIdFromURL();
        currentBlogId = blogId;

        const blogTitle = document.getElementById("blogTitle");
        const blogImage = document.getElementById("blogImage");
        const blogDate = document.getElementById("blogDate");
        const blogReadTime = document.getElementById("blogReadTime");
        const blogInsight = document.getElementById("blogInsight");
        const blogFullContent = document.getElementById("blogFullContent");

        if (!blogId) {
          if (blogTitle) blogTitle.textContent = "Blog Not Found";
          return;
        }

        try {
          const blogRef = doc(db, "blog", blogId);
          const blogSnap = await getDoc(blogRef);

          if (!blogSnap.exists()) {
            if (blogTitle) blogTitle.textContent = "Blog Not Found";
            return;
          }

          const blogData = blogSnap.data();

          if (blogTitle) blogTitle.textContent = blogData.title || "Untitled Blog";
          if (blogImage)
            blogImage.src =
              blogData.imageUrl || "https://via.placeholder.com/800x400?text=No+Image";
          if (blogDate) blogDate.textContent = formatDate(blogData.publishedAt);
          if (blogReadTime) blogReadTime.textContent = `${blogData.min_read || 5} min read`;
          if (blogInsight) blogInsight.textContent = `${blogData.insight_score || 85}% Insight`;

          const fullContent = blogData.content || blogData.description || "No content available";
          if (blogFullContent) blogFullContent.innerHTML = formatContent(fullContent);

          if (typeof gsap !== "undefined") {
            gsap.from(".hero-content", {
              opacity: 0,
              y: 20,
              duration: 0.5,
              ease: "power2.out",
            });
            gsap.from(".content-card", {
              opacity: 0,
              y: 30,
              duration: 0.5,
              delay: 0.2,
              ease: "power2.out",
            });
          }

          await loadComments();
        } catch (error) {
          console.error("Error loading blog:", error);
          if (blogTitle) blogTitle.textContent = "Error Loading Blog";
        }
      }

      async function loadComments() {
        if (!currentBlogId) return;

        const commentsList = document.getElementById("commentsList");
        const commentsLoading = document.getElementById("commentsLoading");
        const commentCount = document.getElementById("commentCount");

        if (!commentsList) return;

        try {
          const commentsRef = collection(db, "blog", currentBlogId, "comments");
          const q = query(commentsRef, orderBy("timestamp", "desc"));
          const snapshot = await getDocs(q);

          if (commentsLoading) commentsLoading.style.display = "none";

          if (snapshot.empty) {
            commentsList.innerHTML =
              '<p style="text-align: center; color: #64748b; padding: 2rem;">No comments yet. Be the first!</p>';
            if (commentCount) commentCount.textContent = "0 comments";
            return;
          }

          commentsList.innerHTML = "";
          snapshot.docs.forEach((doc) => {
            const comment = doc.data();
            const card = createCommentCard(comment);
            commentsList.appendChild(card);
          });

          if (commentCount)
            commentCount.textContent = `${snapshot.size} comment${
              snapshot.size !== 1 ? "s" : ""
            }`;
        } catch (error) {
          console.error("Error loading comments:", error);
          if (commentsLoading) commentsLoading.style.display = "none";
          commentsList.innerHTML =
            '<p style="text-align: center; color: #ef4444; padding: 2rem;">Failed to load comments</p>';
        }
      }

      function createCommentCard(comment) {
        const card = document.createElement("div");
        card.className = "comment-card";

        const authorInitial = comment.userName
          ? comment.userName.charAt(0).toUpperCase()
          : "U";
        const commentTime = formatCommentTime(comment.timestamp);

        card.innerHTML = `
          <div class="comment-header-row">
            <div class="comment-author">
              <div class="comment-avatar">${authorInitial}</div>
              <div>
                <div class="comment-author-name">${escapeHtml(
                  comment.userName || "Anonymous"
                )}</div>
                <div class="comment-time">${commentTime}</div>
              </div>
            </div>
          </div>
          <div class="comment-text">${escapeHtml(comment.text || "")}</div>
        `;

        return card;
      }

      async function submitComment() {
        if (!currentUser) {
          alert("Please sign in to post comments");
          return;
        }

        const commentInput = document.getElementById("commentInput");
        const submitBtn = document.getElementById("submitCommentBtn");
        const commentsList = document.getElementById("commentsList");

        if (!commentInput || !submitBtn) return;

        const commentText = commentInput.value.trim();
        if (!commentText) {
          alert("Please write a comment");
          return;
        }

        if (!currentBlogId) {
          alert("Blog not found");
          return;
        }

        if (commentsList) commentsList.innerHTML = '<div class="loading-spinner"></div>';

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Posting...';

        try {
          const commentsRef = collection(db, "blog", currentBlogId, "comments");
          await addDoc(commentsRef, {
            text: commentText,
            userId: currentUser.uid,
            userName:
              currentUser.displayName ||
              currentUser.email?.split("@")[0] ||
              "Anonymous",
            userEmail: currentUser.email,
            timestamp: serverTimestamp(),
          });

          commentInput.value = "";
          await loadComments();
        } catch (error) {
          console.error("Error posting comment:", error);
          alert("Failed to post comment. Please try again.");
          await loadComments();
        } finally {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              'Post Comment <i class="fas fa-arrow-right" style="margin-left: 0.5rem"></i>';
          }
        }
      }

      function updateAuthUI(user) {
        currentUser = user;

        const authRequired = document.getElementById("authRequired");
        const commentForm = document.getElementById("commentForm");

        if (user) {
          if (authRequired) authRequired.classList.add("hidden");
          if (commentForm) commentForm.classList.remove("hidden");
        } else {
          if (authRequired) authRequired.classList.remove("hidden");
          if (commentForm) commentForm.classList.add("hidden");
        }
      }

      window.addEventListener("scroll", () => {
        const header = document.getElementById("mainHeader");
        if (header) {
          header.classList.toggle("scrolled", window.scrollY > 50);
        }
      });

      window.submitComment = submitComment;

      document.addEventListener("DOMContentLoaded", function () {
        loadBlog();

        onAuthStateChanged(auth, (user) => {
          updateAuthUI(user);
          if (user) {
            localStorage.setItem(
              "galaxy_user",
              JSON.stringify({
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                photoURL: user.photoURL,
              })
            );
          } else {
            localStorage.removeItem("galaxy_user");
          }
        });
      });
    </script>
  </body>
</html>
