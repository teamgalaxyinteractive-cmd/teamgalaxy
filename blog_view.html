<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Blog Detail | Galaxy Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#2563eb",
              secondary: "#06b6d4",
              accent: "#93c5fd",
              dark: "#0a0f1d",
              dark2: "#111827",
              dark3: "#1e293b",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }

      body {
        background: linear-gradient(135deg, #0a0f1d 0%, #111827 50%, #0a0f1d 100%);
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        line-height: 1.6;
      }

      /* ===== PERFORMANCE: GPU Acceleration ===== */
      .accelerate {
        will-change: transform;
        transform: translateZ(0);
        backface-visibility: hidden;
      }

      /* ===== MINIMAL CREATIVE HEADER ===== */
      .minimal-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: transparent;
        transition: background 0.3s ease, border-color 0.3s ease;
      }

      .minimal-header.scrolled {
        background: rgba(10, 15, 29, 0.95);
        border-bottom: 1px solid rgba(37, 99, 235, 0.2);
        padding: 0.75rem 2rem;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        transition: all 0.3s ease;
        background: rgba(30, 41, 59, 0.3);
      }

      .back-btn:hover {
        color: #2563eb;
        border-color: rgba(37, 99, 235, 0.5);
        background: rgba(37, 99, 235, 0.1);
        transform: translateX(-3px);
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        font-size: 1.1rem;
      }

      .logo-text {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 1.1rem;
        color: white;
      }

      .logo-text span {
        color: #2563eb;
      }

      /* ===== OPTIMIZED HERO SECTION ===== */
      .blog-hero {
        position: relative;
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8rem 2rem 4rem;
        overflow: hidden;
      }

      /* ===== SIMPLIFIED BACKGROUND (Performance Optimized) ===== */
      .hero-bg-gradient {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 25% 35%, rgba(37, 99, 235, 0.2) 0%, transparent 50%),
          radial-gradient(ellipse at 75% 25%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
        z-index: -1;
      }

      /* ===== REDUCED PARTICLES (4 instead of 8) ===== */
      .hero-particle {
        position: absolute;
        border-radius: 50%;
        background: #2563eb;
        opacity: 0.3;
        z-index: -1;
      }

      .hero-particle-1 {
        width: 6px;
        height: 6px;
        top: 20%;
        left: 15%;
        animation: particleFloat1 15s ease-in-out infinite;
      }

      .hero-particle-2 {
        width: 4px;
        height: 4px;
        top: 35%;
        right: 20%;
        animation: particleFloat2 18s ease-in-out infinite;
      }

      .hero-particle-3 {
        width: 5px;
        height: 5px;
        bottom: 25%;
        left: 25%;
        animation: particleFloat1 20s ease-in-out infinite;
      }

      .hero-particle-4 {
        width: 4px;
        height: 4px;
        bottom: 35%;
        right: 15%;
        animation: particleFloat2 16s ease-in-out infinite;
      }

      @keyframes particleFloat1 {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        50% {
          transform: translateY(-20px);
          opacity: 0.5;
        }
      }

      @keyframes particleFloat2 {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        50% {
          transform: translateY(-15px);
          opacity: 0.4;
        }
      }

      /* ===== SINGLE ORB (instead of 4) ===== */
      .hero-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
        filter: blur(60px);
        opacity: 0.4;
        top: 10%;
        right: 10%;
        z-index: -1;
        animation: orbFloat 25s ease-in-out infinite;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0.4;
        }
        50% {
          transform: translate(-30px, 20px);
          opacity: 0.5;
        }
      }

      .hero-content {
        text-align: center;
        max-width: 900px;
        position: relative;
        z-index: 1;
        width: 100%;
      }

      .blog-category-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        background: rgba(37, 99, 235, 0.15);
        border: 1px solid rgba(37, 99, 235, 0.3);
        border-radius: 50px;
        font-size: 0.85rem;
        color: #93c5fd;
        margin-bottom: 2rem;
      }

      .blog-hero-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.75rem, 4vw, 3rem);
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #93c5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        word-wrap: break-word;
        overflow-wrap: break-word;
        text-align: center;
        width: 100%;
      }

      .blog-hero-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem;
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 2.5rem;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        white-space: nowrap;
      }

      .meta-item i {
        color: #2563eb;
      }

      .hero-image-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(37, 99, 235, 0.2);
      }

      .hero-image {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
      }

      .image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(10, 15, 29, 0.6) 0%, transparent 50%);
      }

      /* ===== BLOG CONTENT SECTION ===== */
      .blog-content-section {
        padding: 4rem 2rem;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
      }

      .content-card {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 24px;
        padding: 2.5rem;
        margin-bottom: 3rem;
        width: 100%;
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-word;
      }

      .blog-full-content {
        font-size: 1.125rem;
        line-height: 1.9;
        color: #cbd5e1;
        width: 100%;
        overflow-wrap: break-word;
        word-wrap: break-word;
      }

      .blog-full-content p {
        margin-bottom: 1.5rem;
        overflow-wrap: break-word;
      }

      .blog-full-content h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.75rem;
        color: #ffffff;
        margin: 2.5rem 0 1rem;
      }

      .blog-full-content h3 {
        font-size: 1.4rem;
        color: #e2e8f0;
        margin: 2rem 0 0.75rem;
      }

      .blog-full-content ul,
      .blog-full-content ol {
        margin: 1rem 0 1.5rem 1.5rem;
        color: #cbd5e1;
      }

      .blog-full-content li {
        margin-bottom: 0.5rem;
      }

      .blog-full-content a {
        color: #2563eb;
        text-decoration: underline;
      }

      .blog-full-content blockquote {
        border-left: 4px solid #2563eb;
        padding-left: 1.5rem;
        margin: 2rem 0;
        font-style: italic;
        color: #93c5fd;
        background: rgba(37, 99, 235, 0.1);
        padding: 1rem 1.5rem;
        border-radius: 0 8px 8px 0;
      }

      /* ===== COMMENT SECTION ===== */
      .comment-section {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
      }

      .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .comment-header h2 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #ffffff;
      }

      .comment-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .comment-input {
        width: 100%;
        padding: 1rem 1.25rem;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(56, 189, 248, 0.2);
        border-radius: 12px;
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        resize: vertical;
        min-height: 120px;
        transition: border-color 0.3s ease;
      }

      .comment-input:focus {
        outline: none;
        border-color: #2563eb;
      }

      .comment-submit {
        align-self: flex-end;
        padding: 0.75rem 2rem;
        background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.3s ease;
      }

      .comment-submit:hover {
        opacity: 0.9;
      }

      .comment-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .comments-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        min-height: 50px;
      }

      .comment-card {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(56, 189, 248, 0.15);
        border-radius: 14px;
        padding: 1.25rem;
        transition: border-color 0.3s ease;
        width: 100%;
      }

      .comment-card:hover {
        border-color: rgba(37, 99, 235, 0.3);
      }

      .comment-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .comment-author {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .comment-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: white;
        flex-shrink: 0;
      }

      .comment-author-name {
        font-weight: 600;
        color: #e2e8f0;
        word-break: break-word;
        max-width: 200px;
      }

      .comment-time {
        color: #64748b;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .comment-text {
        color: #cbd5e1;
        line-height: 1.6;
        word-break: break-word;
        width: 100%;
      }

      .auth-required {
        background: rgba(37, 99, 235, 0.15);
        border: 1px solid rgba(37, 99, 235, 0.3);
        border-radius: 12px;
        padding: 1.25rem;
        text-align: center;
        color: #93c5fd;
        margin-bottom: 1rem;
      }

      .auth-required a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .auth-required a:hover {
        text-decoration: underline;
      }

      /* ===== LOADING ===== */
      .loading-spinner {
        border: 3px solid rgba(37, 99, 235, 0.2);
        border-top: 3px solid #2563eb;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 2rem auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .hidden {
        display: none !important;
      }

      /* ===== FOOTER ===== */
      footer {
        padding: 3rem 2rem;
        border-top: 1px solid rgba(37, 99, 235, 0.15);
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        width: 100%;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .minimal-header {
          padding: 0.75rem 1rem;
        }
        .blog-hero {
          padding: 6rem 1rem 3rem;
          min-height: 50vh;
        }
        .blog-hero-title {
          font-size: 1.5rem;
        }
        .hero-image {
          height: 250px;
        }
        .content-card {
          padding: 1.5rem;
        }
        .blog-content-section {
          padding: 2rem 1rem;
        }
        .comment-section {
          padding: 1.25rem;
        }
        .blog-hero-meta {
          gap: 1rem;
          font-size: 0.8rem;
          flex-direction: column;
          align-items: center;
        }
        .back-btn span {
          display: none;
        }
        .hero-orb {
          width: 200px;
          height: 200px;
        }
      }

      @media (max-width: 480px) {
        .blog-hero-title {
          font-size: 1.25rem;
        }
        .hero-image {
          height: 200px;
        }
        .content-card {
          padding: 1rem;
        }
        .blog-full-content {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== MINIMAL HEADER ===== -->
    <header class="minimal-header" id="mainHeader">
      <div class="header-left">
        <a href="/blogs" class="back-btn">
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </a>
        <a href="/" class="header-logo">
          <div class="logo-icon overflow-hidden">
            <img src="https://dl.dropboxusercontent.com/scl/fi/qiz5tbbi77uay7b4b0hro/1000049265-removebg-preview.png?rlkey=uu02he5cjm03e3ehjqceiw1hr&st=10n27rjt&dl=0" alt="Galaxy Design Logo" class="w-full h-full object-contain" />
          </div>
          <span class="logo-text">Galaxy<span>Design</span></span>
        </a>
      </div>

    </header>

    <!-- ===== HERO SECTION ===== -->
    <section class="blog-hero">
      <div class="hero-bg-gradient"></div>
      <div class="hero-orb"></div>
      <div class="hero-particle hero-particle-1"></div>
      <div class="hero-particle hero-particle-2"></div>
      <div class="hero-particle hero-particle-3"></div>
      <div class="hero-particle hero-particle-4"></div>

      <div class="hero-content">
        <div class="blog-category-badge">
          <i class="fas fa-article"></i>
          <span>Blog Post</span>
        </div>
        <h1 class="blog-hero-title" id="blogTitle">Loading...</h1>
        <div class="blog-hero-meta">
          <div class="meta-item">
            <i class="fas fa-calendar"></i>
            <span id="blogDate">--</span>
          </div>
          <div class="meta-item">
            <i class="fas fa-clock"></i>
            <span id="blogReadTime">-- min read</span>
          </div>
          <div class="meta-item">
            <i class="fas fa-star" style="color: #fbbf24"></i>
            <span id="blogInsight">--% Insight</span>
          </div>
        </div>
        <div class="hero-image-container">
          <img
            id="blogImage"
            src=""
            alt="Blog Image"
            class="hero-image"
            onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found'"
          />
          <div class="image-overlay"></div>
        </div>
      </div>
    </section>

    <!-- ===== BLOG CONTENT ===== -->
    <section class="blog-content-section">
      <div class="content-card">
        <div id="blogFullContent" class="blog-full-content"></div>
      </div>

      <!-- ===== COMMENTS ===== -->
      <div class="comment-section">
        <div class="comment-header">
          <h2>
            <i class="fas fa-comments" style="color: #2563eb; margin-right: 0.5rem"></i>Comments
          </h2>
          <span id="commentCount" style="color: #64748b; font-size: 0.9rem">0 comments</span>
        </div>

        <div id="authRequired" class="auth-required hidden">
          <i class="fas fa-lock" style="margin-right: 0.5rem"></i>
          Please <a href="/legal/sign_up">sign in</a> to post comments
        </div>

        <div id="commentForm" class="comment-form hidden">
          <textarea
            id="commentInput"
            class="comment-input"
            placeholder="Share your thoughts..."
            maxlength="500"
          ></textarea>
          <button id="submitCommentBtn" class="comment-submit" onclick="submitComment()">
            <i class="fas fa-paper-plane" style="margin-right: 0.5rem"></i> Post Comment
          </button>
        </div>

        <div id="commentsList" class="comments-list">
          <div class="loading-spinner" id="commentsLoading"></div>
        </div>
      </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
      <p>© 2026 Galaxy Design. All rights reserved.</p>
    </footer>

    <!-- ===== FIREBASE & FUNCTIONALITY ===== -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
      import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        collection,
        addDoc,
        query,
        orderBy,
        getDocs,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD0Yv_bQjxi2_kjzPR4XHOlaB7Sb6NRVUc",
        authDomain: "teamgalaxy-77344.firebaseapp.com",
        projectId: "teamgalaxy-77344",
        storageBucket: "teamgalaxy-77344.firebasestorage.app",
        messagingSenderId: "770256225320",
        appId: "1:770256225320:web:5a363ebd757de6cde3a11d",
        measurementId: "G-6C2W9NSNCH",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentBlogId = null;
      let currentUser = null;

      function getBlogIdFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        let blogId = urlParams.get("");
        if (!blogId) blogId = urlParams.get("blogId");
        if (!blogId) {
          const pathParts = window.location.pathname.split("/");
          blogId = pathParts[pathParts.length - 1];
        }
        return blogId;
      }

      function formatDate(timestamp) {
        if (!timestamp) return "Unknown Date";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return date.toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function formatCommentTime(timestamp) {
        if (!timestamp) return "Just now";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return formatDate(timestamp);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function formatContent(text) {
        if (!text) return "<p>No content available</p>";
        const paragraphs = text.split(/\n\n+/);
        return paragraphs.map((p) => `<p>${escapeHtml(p.trim())}</p>`).join("");
      }

      async function loadBlog() {
        const blogId = getBlogIdFromURL();
        currentBlogId = blogId;

        const blogTitle = document.getElementById("blogTitle");
        const blogImage = document.getElementById("blogImage");
        const blogDate = document.getElementById("blogDate");
        const blogReadTime = document.getElementById("blogReadTime");
        const blogInsight = document.getElementById("blogInsight");
        const blogFullContent = document.getElementById("blogFullContent");

        if (!blogId) {
          if (blogTitle) blogTitle.textContent = "Blog Not Found";
          return;
        }

        try {
          const blogRef = doc(db, "blog", blogId);
          const blogSnap = await getDoc(blogRef);

          if (!blogSnap.exists()) {
            if (blogTitle) blogTitle.textContent = "Blog Not Found";
            return;
          }

          const blogData = blogSnap.data();

          if (blogTitle) blogTitle.textContent = blogData.title || "Untitled Blog";
          if (blogImage)
            blogImage.src =
              blogData.imageUrl || "https://via.placeholder.com/800x400?text=No+Image";
          if (blogDate) blogDate.textContent = formatDate(blogData.publishedAt);
          if (blogReadTime) blogReadTime.textContent = `${blogData.min_read || 5} min read`;
          if (blogInsight) blogInsight.textContent = `${blogData.insight_score || 85}% Insight`;

          const fullContent = blogData.content || blogData.description || "No content available";
          if (blogFullContent) blogFullContent.innerHTML = formatContent(fullContent);

          // Lightweight GSAP animation
          if (typeof gsap !== "undefined") {
            gsap.from(".hero-content", {
              opacity: 0,
              y: 20,
              duration: 0.5,
              ease: "power2.out",
            });
            gsap.from(".content-card", {
              opacity: 0,
              y: 30,
              duration: 0.5,
              delay: 0.2,
              ease: "power2.out",
            });
          }

          await loadComments();
        } catch (error) {
          console.error("Error loading blog:", error);
          if (blogTitle) blogTitle.textContent = "Error Loading Blog";
        }
      }

      async function loadComments() {
        if (!currentBlogId) return;

        const commentsList = document.getElementById("commentsList");
        const commentsLoading = document.getElementById("commentsLoading");
        const commentCount = document.getElementById("commentCount");

        if (!commentsList) return;

        try {
          const commentsRef = collection(db, "blog", currentBlogId, "comments");
          const q = query(commentsRef, orderBy("timestamp", "desc"));
          const snapshot = await getDocs(q);

          if (commentsLoading) commentsLoading.style.display = "none";

          if (snapshot.empty) {
            commentsList.innerHTML =
              '<p style="text-align: center; color: #64748b; padding: 2rem;">No comments yet. Be the first!</p>';
            if (commentCount) commentCount.textContent = "0 comments";
            return;
          }

          commentsList.innerHTML = "";
          snapshot.docs.forEach((doc) => {
            const comment = doc.data();
            const card = createCommentCard(comment);
            commentsList.appendChild(card);
          });

          if (commentCount)
            commentCount.textContent = `${snapshot.size} comment${
              snapshot.size !== 1 ? "s" : ""
            }`;
        } catch (error) {
          console.error("Error loading comments:", error);
          if (commentsLoading) commentsLoading.style.display = "none";
          commentsList.innerHTML =
            '<p style="text-align: center; color: #ef4444; padding: 2rem;">Failed to load comments</p>';
        }
      }

      function createCommentCard(comment) {
        const card = document.createElement("div");
        card.className = "comment-card";

        const authorInitial = comment.userName
          ? comment.userName.charAt(0).toUpperCase()
          : "U";
        const commentTime = formatCommentTime(comment.timestamp);

        card.innerHTML = `
          <div class="comment-header-row">
            <div class="comment-author">
              <div class="comment-avatar">${authorInitial}</div>
              <div>
                <div class="comment-author-name">${escapeHtml(
                  comment.userName || "Anonymous"
                )}</div>
                <div class="comment-time">${commentTime}</div>
              </div>
            </div>
          </div>
          <div class="comment-text">${escapeHtml(comment.text || "")}</div>
        `;

        return card;
      }

      async function submitComment() {
        if (!currentUser) {
          alert("Please sign in to post comments");
          return;
        }

        const commentInput = document.getElementById("commentInput");
        const submitBtn = document.getElementById("submitCommentBtn");
        const commentsList = document.getElementById("commentsList");

        if (!commentInput || !submitBtn) return;

        const commentText = commentInput.value.trim();
        if (!commentText) {
          alert("Please write a comment");
          return;
        }

        if (!currentBlogId) {
          alert("Blog not found");
          return;
        }

        if (commentsList) commentsList.innerHTML = '<div class="loading-spinner"></div>';

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Posting...';

        try {
          const commentsRef = collection(db, "blog", currentBlogId, "comments");
          await addDoc(commentsRef, {
            text: commentText,
            userId: currentUser.uid,
            userName:
              currentUser.displayName ||
              currentUser.email?.split("@")[0] ||
              "Anonymous",
            userEmail: currentUser.email,
            timestamp: serverTimestamp(),
          });

          commentInput.value = "";
          await loadComments();
        } catch (error) {
          console.error("Error posting comment:", error);
          alert("Failed to post comment. Please try again.");
          await loadComments();
        } finally {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              '<i class="fas fa-paper-plane" style="margin-right: 0.5rem;"></i> Post Comment';
          }
        }
      }

      function updateAuthUI(user) {
        currentUser = user;

        const authRequired = document.getElementById("authRequired");
        const commentForm = document.getElementById("commentForm");

        if (user) {
          if (authRequired) authRequired.classList.add("hidden");
          if (commentForm) commentForm.classList.remove("hidden");
          // User avatar/sign-out removed as requested
        } else {
          if (authRequired) authRequired.classList.remove("hidden");
          if (commentForm) commentForm.classList.add("hidden");
        }
      }

      window.addEventListener("scroll", () => {
        const header = document.getElementById("mainHeader");
        if (header) {
          header.classList.toggle("scrolled", window.scrollY > 50);
        }
      });

      window.submitComment = submitComment;

      document.addEventListener("DOMContentLoaded", function () {
        loadBlog();

        onAuthStateChanged(auth, (user) => {
          updateAuthUI(user);
          if (user) {
            localStorage.setItem(
              "galaxy_user",
              JSON.stringify({
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                photoURL: user.photoURL,
              })
            );
          } else {
            localStorage.removeItem("galaxy_user");
          }
        });
      });
    </script>
  </body>
</html>
