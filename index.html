<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Design | Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #01040a;
            --accent: #3b82f6;
            --cyan: #06b6d4;
            --text: #ffffff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 1. DYNAMIC BACKGROUND (NEBULA DUST) --- */
        .universe {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #01040a 100%);
            z-index: 1;
        }

        .nebula {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            filter: blur(80px);
            animation: drift 20s infinite alternate ease-in-out;
        }

        /* --- 2. THE STAGE --- */
        .stage {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        /* LOGO: STEP 1 (Fade & Focus) */
        .logo-wrap {
            width: 160px; /* Adjusted for premium look */
            margin-bottom: 20px;
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.9) translateY(10px);
            animation: logoIn 1.8s var(--ease) forwards 0.5s;
        }

        .logo-wrap img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.4));
        }

        /* TITLE MASK: STEP 2 (Slide Down) */
        .title-mask {
            overflow: hidden;
            padding: 5px 20px;
        }

        .brand-name {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(-105%);
            
            /* High-end Metallic Gradient */
            background: linear-gradient(to bottom, #fff 40%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            animation: titleSlide 1.8s var(--ease) forwards 1.8s;
            position: relative;
        }

        /* LIGHT SWEEP EFFECT (The "Impressive" Touch) */
        .brand-name::after {
            content: "GALAXY DESIGN";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            -webkit-background-clip: text;
            background-size: 200% 100%;
            animation: shimmer 3s infinite 3.5s;
            pointer-events: none;
        }

        /* TAGLINE: STEP 3 */
        .tagline {
            font-size: clamp(0.6rem, 1.5vw, 0.85rem);
            font-weight: 200;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            color: var(--cyan);
            margin-top: 15px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 1.2s var(--ease) forwards 3s;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        /* --- 3. REDIRECT FADE --- */
        .white-out {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 1000;
            mix-blend-mode: overlay;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        /* --- ANIMATIONS --- */
        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        @keyframes logoIn {
            to { opacity: 1; filter: blur(0); transform: scale(1) translateY(0); }
        }

        @keyframes titleSlide {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            30% { background-position: 200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .is-leaving .stage {
            transform: scale(1.05);
            opacity: 0;
            filter: blur(20px);
            transition: all 1s var(--ease);
        }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
    </div>

    <div class="white-out" id="flash"></div>

    <div class="stage" id="stage">
        <div class="logo-wrap">
            <img src="https://dl.dropboxusercontent.com/scl/fi/38qel415mk6bd3n5bnsfv/premium_png_logo.png.jpg?rlkey=0v8zyz7568mmm5zr2ko6ldt10&st=hieetjls&raw=1" alt="Galaxy Design Premium Logo">
        </div>

        <div class="title-mask">
            <h1 class="brand-name">GALAXY DESIGN</h1>
        </div>

        <p class="tagline">Designing Digital Universes</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stage = document.getElementById('stage');
            const flash = document.getElementById('flash');

            // 1. Ultra-Smooth Parallax (Client loves this subtle movement)
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.006;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.006;
                stage.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });

            // 2. Redirect Sequence (Total 7 seconds for full impact)
            setTimeout(() => {
                document.body.classList.add('is-leaving');
                flash.style.opacity = '0.1'; // Subtle flash effect

                setTimeout(() => {
                    // Path to your dashboard
                    window.location.href = '/dashboard';
                }, 900);
            }, 6800);
        });
    </script>
</body>
</html>
